<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --background: 220 15% 5%;
        --foreground: 160 100% 90%;
        --primary: 160 100% 50%;
        --muted-foreground: 220 10% 65%;
        --border: 160 30% 15%;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 1200px;
        height: 630px;
        background: hsl(var(--background));
        color: hsl(var(--foreground));
        font-family: "JetBrains Mono", monospace;
        overflow: hidden;
        position: relative;
      }

      /* Same 60px grid the site paints behind its sections */
      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(hsl(var(--primary) / 0.05) 1px, transparent 1px),
          linear-gradient(90deg, hsl(var(--primary) / 0.05) 1px, transparent 1px);
        background-size: 60px 60px;
      }

      /* Accent glow behind the portrait, echoing the hero */
      .glow {
        position: absolute;
        width: 620px;
        height: 620px;
        right: -140px;
        top: 50%;
        transform: translateY(-50%);
        background: radial-gradient(
          circle,
          hsl(var(--primary) / 0.16) 0%,
          transparent 62%
        );
      }

      .frame {
        position: absolute;
        inset: 28px;
        border: 1px solid hsl(var(--border));
      }

      /* Corner ticks — the terminal motif from the site chrome */
      .tick {
        position: absolute;
        width: 18px;
        height: 18px;
        border-color: hsl(var(--primary));
        border-style: solid;
        border-width: 0;
      }
      .tick.tl { top: -1px; left: -1px; border-top-width: 2px; border-left-width: 2px; }
      .tick.tr { top: -1px; right: -1px; border-top-width: 2px; border-right-width: 2px; }
      .tick.bl { bottom: -1px; left: -1px; border-bottom-width: 2px; border-left-width: 2px; }
      .tick.br { bottom: -1px; right: -1px; border-bottom-width: 2px; border-right-width: 2px; }

      .content {
        position: absolute;
        inset: 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 68px 0 76px;
      }

      .copy {
        max-width: 620px;
      }

      .eyebrow {
        font-size: 15px;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: hsl(var(--primary));
        margin-bottom: 30px;
      }

      h1 {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 78px;
        line-height: 1.02;
        letter-spacing: -0.02em;
        color: hsl(var(--foreground));
      }

      .role {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 500;
        font-size: 31px;
        line-height: 1.3;
        color: hsl(var(--primary));
        margin-top: 22px;
      }

      .blurb {
        font-size: 17px;
        line-height: 1.6;
        color: hsl(var(--muted-foreground));
        margin-top: 26px;
        max-width: 540px;
      }

      .url {
        position: absolute;
        left: 76px;
        bottom: 46px;
        font-size: 16px;
        letter-spacing: 0.2em;
        color: hsl(var(--muted-foreground));
      }
      .url .caret {
        color: hsl(var(--primary));
        margin-right: 12px;
      }

      .portrait {
        position: relative;
        flex-shrink: 0;
      }
      .portrait img {
        width: 340px;
        height: 340px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid hsl(var(--primary) / 0.55);
        display: block;
      }
      .ring {
        position: absolute;
        inset: -22px;
        border: 1px solid hsl(var(--primary) / 0.2);
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <div class="glow"></div>

    <div class="frame">
      <span class="tick tl"></span>
      <span class="tick tr"></span>
      <span class="tick bl"></span>
      <span class="tick br"></span>
    </div>

    <div class="content">
      <div class="copy">
        <!-- Every line below is existing site copy: the eyebrow and role come
             from the Hero role list, the blurb from the homepage meta
             description. Nothing here is new positioning. -->
        <div class="eyebrow">AI &middot; Cloud &middot; Web3</div>
        <h1>Pratik Patel</h1>
        <div class="role">CTO &amp; Chief Architect</div>
        <p class="blurb">
          Technology executive and 3x company builder with 11+ years scaling
          engineering orgs. Currently Chief Architect at Tarobase.
        </p>
      </div>

      <div class="portrait">
        <span class="ring"></span>
        <img src="../public/images/headshot.png" alt="Pratik Patel" />
      </div>
    </div>

    <div class="url"><span class="caret">&gt;</span>pratik.pa.tel</div>
  </body>
</html>
