name: Blog Auto-Merge

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  run-automerge-routine:
    if: github.repository == 'prpatel05/website'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run blog auto-merge routine
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/blog-automerge.sh
